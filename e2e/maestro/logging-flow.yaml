appId: com.kimxons.VigilFit
---
- launchApp
- assertVisible: "Sign in to your account"
- tapOn:
    id: "sign-in-email-input"
- inputText: "e2e.mobile@vigilfit.test"
- tapOn:
    id: "sign-in-password-input"
- inputText: "Password1234"
- hideKeyboard
- tapOn:
    id: "sign-in-submit-button"
- assertVisible:
    id: "dashboard-title"

- tapOn: "Workouts"
- assertVisible: "Add workout"
- tapOn:
    id: "workout-type-input"
- inputText: "E2E Strength Session"
- tapOn:
    id: "workout-duration-input"
- inputText: "45"
- tapOn:
    id: "workout-calories-input"
- inputText: "320"
- tapOn:
    id: "workout-notes-input"
- inputText: "E2E workout note"
- hideKeyboard
- tapOn:
    id: "workout-save-button"
- assertVisible: "E2E Strength Session"
- assertVisible: "E2E workout note"

- tapOn: "Nutrition"
- assertVisible: "Add meal log"
- tapOn:
    id: "nutrition-meal-type-input"
- inputText: "Dinner"
- tapOn:
    id: "nutrition-food-name-input"
- inputText: "E2E Chicken Bowl"
- tapOn:
    id: "nutrition-calories-input"
- inputText: "640"
- tapOn:
    id: "nutrition-protein-input"
- inputText: "45"
- tapOn:
    id: "nutrition-carbs-input"
- inputText: "70"
- tapOn:
    id: "nutrition-fat-input"
- inputText: "18"
- tapOn:
    id: "nutrition-notes-input"
- inputText: "E2E nutrition note"
- hideKeyboard
- tapOn:
    id: "nutrition-save-button"
- assertVisible: "Dinner: E2E Chicken Bowl"
- assertVisible: "E2E nutrition note"

- tapOn: "Account"
- tapOn:
    id: "sign-out-button"
- assertVisible: "Sign in to your account"
